<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact - Robby Boney</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Ensure the canvas covers the entire background */
    #gameOfLifeCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1; /* Place the canvas behind other content */
      background-color: #ffffff; /* Match the body background */
    }
  </style>
</head>
<body class="bg-white text-gray-800 min-h-screen relative">
  <!-- Canvas for Game of Life -->
  <canvas id="gameOfLifeCanvas"></canvas>

  <div class="container mx-auto p-8 flex-grow z-10 relative">
    <h1 class="text-4xl font-bold mb-4">Contact</h1>
    <p class="text-lg">Feel free to reach out via <a href="mailto:your-email@example.com" class="text-blue-500 underline">email</a>.</p>
  </div>

  <!-- Footer (Optional) -->
  <footer class="bg-gray-100 p-4 text-center z-10 relative">
    <p class="text-sm text-gray-600">&copy; 2024 Robby Boney. All rights reserved.</p>
  </footer>

  <!-- Import Game of Life Script -->
  <script src="gol.js"></script>
</body>
</html>
